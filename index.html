<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEODEV_OS // v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1 class="terminal-prompt" onclick="location.reload()" style="cursor:pointer">
                C:\TEODEV><span class="cursor"></span>
            </h1>
            <p class="subtitle">SYSTEM BOOT SUCCESSFUL. ARCHIVE ACCESSIBLE.</p>
        </header>

        <main id="main-feed">
            <div id="loading-state" class="terminal-panel">
                <p class="loading">C:\> DIR /S /B ... FETCHING DATA</p>
            </div>
        </main>

        <footer>
            EOF // SYSTEM STANDBY
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
    apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0",
  measurementId: "G-JKE237HSTE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const feedContainer = document.getElementById('main-feed');

        // ==========================================
        // BLOG DATA LOGIC
        // ==========================================
        async function loadFeed() {
            try {
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    feedContainer.innerHTML = '<div class="terminal-panel"><h3>ERROR 404</h3><p>NO FILES FOUND ON DRIVE.</p></div>';
                    return;
                }

                feedContainer.innerHTML = ''; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const postDate = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : "DATE_UNKNOWN";
                    
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = data.content;
                    const snippet = tempDiv.textContent.substring(0, 150) + "...";

                    const card = document.createElement('div');
                    card.className = "terminal-panel post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <h2 class="post-title">FILE: ${data.title}</h2>
                            <span class="post-date">[${postDate}]</span>
                        </div>
                        <p class="post-snippet">${snippet}</p>
                        <button class="read-more">C:\> TYPE FILE.TXT</button>
                    `;

                    card.onclick = () => openFullPost(data);
                    feedContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                feedContainer.innerHTML = '<div class="terminal-panel"><p class="error">FATAL ERROR: CONNECTION LOST.</p></div>';
            }
        }

        function openFullPost(data) {
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            feedContainer.innerHTML = `
                <div class="terminal-panel">
                    <button class="back-btn" onclick="location.reload()">< CD ..</button>
                    <h2>${data.title}</h2>
                    <div style="border-bottom: 1px dashed var(--text-muted); margin-bottom: 1rem;"></div>
                    
                    <div class="full-content">${data.content}</div>
                    
                    <div style="margin-top: 3rem; border-top: var(--border-style); padding-top: 1rem;">
                        <button class="btn-retro" onclick="alert('ACKNOWLEDGED.')">UPVOTE_FILE</button>
                    </div>
                </div>
            `;
        }

        // Boot up system
        loadFeed();
    </script>
</body>
</html>
