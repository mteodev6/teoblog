<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev's Cyber Zone!!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS animations to replace external GIFs */
        .fire { display: inline-block; animation: flicker 0.3s infinite alternate; font-size: 3rem; vertical-align: middle; }
        @keyframes flicker { 0% { transform: scale(1) rotate(-5deg); opacity: 0.8; } 100% { transform: scale(1.1) rotate(5deg); opacity: 1; } }
        
        .spin { display: inline-block; animation: spin-anim 2s linear infinite; font-size: 3rem; }
        @keyframes spin-anim { 100% { transform: rotate(360deg); } }

        /* CSS Recreations of classic 88x31 Web Badges */
        .retro-badge {
            display: inline-block;
            width: 88px;
            height: 31px;
            border: 2px outset #ffffff;
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 9px;
            font-weight: bold;
            text-align: center;
            line-height: 12px;
            margin: 0 5px;
            cursor: pointer;
            box-sizing: border-box;
            padding-top: 2px;
        }
        .badge-ie { background: #000080; color: #ffffff; }
        .badge-ie span { color: #00ffff; font-size: 14px; vertical-align: middle; }
        .badge-ns { background: #008080; color: #ffffff; }
        .badge-np { background: #ffffff; color: #000000; border-color: #808080; }
        .badge-np span { color: #ff0000; }
    </style>
</head>
<body>

    <center>
        <marquee scrollamount="8" width="80%" bgcolor="#FF0000">
            <font size="5" color="#FFFFFF"><b>*** WELCOME TO TEODEV'S HOMEPAGE *** UPDATED DAILY *** SIGN MY GUESTBOOK ***</b></font>
        </marquee>
    </center>

    <div class="container">
        <header>
            <h1>
                <span class="fire">🔥</span>
                TEODEV'S ZONE
                <span class="fire">🔥</span>
            </h1>
            <p class="blink">/// SURF THE WEB ///</p>
            <hr>
        </header>

        <main id="main-feed">
            <div class="post-card">
                <center>
                    <h2 class="blink">LOADING DATA...</h2>
                    <span class="spin">🚧</span>
                    <p><b>SITE UNDER CONSTRUCTION</b></p>
                </center>
            </div>
        </main>

        <div class="web-buttons">
            <p><b>You are visitor number:</b></p>
            <div style="background: black; color: red; display: inline-block; padding: 2px 10px; font-family: monospace; font-size: 1.2rem; border: 2px inset gray; letter-spacing: 3px;">
                001337
            </div>
            <br><br>
            
            <div class="retro-badge badge-ie"><span>e</span> GET<br>INTERNET EXPLORER</div>
            <div class="retro-badge badge-ns">NETSCAPE<br>N O W !</div>
            <div class="retro-badge badge-np">MADE WITH<br><span>NOTEPAD</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0",
  measurementId: "G-JKE237HSTE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const feedContainer = document.getElementById('main-feed');

        // ==========================================
        // BLOG DATA LOGIC
        // ==========================================
        async function loadFeed() {
            try {
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    feedContainer.innerHTML = '<div class="post-card"><center><h2>NO POSTS YET!</h2><p>Check back later.</p></center></div>';
                    return;
                }

                feedContainer.innerHTML = ''; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const postDate = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : "Unknown Date";
                    
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = data.content;
                    const snippet = tempDiv.textContent.substring(0, 150) + "...";

                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <h2 class="post-title">${data.title}</h2>
                            <span class="post-date">Posted on: ${postDate}</span>
                        </div>
                        <p class="post-snippet">${snippet}</p>
                        <center><a onclick="openFullPost(this)" data-id="${doc.id}">Click here to read more...</a></center>
                    `;

                    card.querySelector('a').onclick = () => openFullPost(data);
                    feedContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                feedContainer.innerHTML = '<div class="post-card"><center><h2 style="color:red;">BROKEN LINK!</h2><p>Tell the webmaster.</p></center></div>';
            }
        }

        function openFullPost(data) {
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            feedContainer.innerHTML = `
                <div class="full-post-view">
                    <a onclick="location.reload()"><< Back to Homepage</a>
                    <hr>
                    <h2 style="color: #0000FF; margin-bottom: 0;">${data.title}</h2>
                    <br>
                    <div class="full-content">${data.content}</div>
                    <hr>
                    <center>
                        <a href="mailto:fake@email.com">Email the Author</a>
                    </center>
                </div>
            `;
        }

        loadFeed();
    </script>
</body>
</html>
