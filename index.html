<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev's Cyber Zone!!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <center>
        <marquee scrollamount="8" width="80%" bgcolor="#FF0000">
            <font size="5" color="#FFFFFF"><b>*** WELCOME TO TEODEV'S HOMEPAGE *** UPDATED DAILY *** SIGN MY GUESTBOOK ***</b></font>
        </marquee>
    </center>

    <div class="container">
        <header>
            <h1>
                <img src="https://web.archive.org/web/20090829012411/http://geocities.com/SiliconValley/Lakes/4929/flames.gif" alt="flames">
                TEODEV'S ZONE
                <img src="https://web.archive.org/web/20090829012411/http://geocities.com/SiliconValley/Lakes/4929/flames.gif" alt="flames">
            </h1>
            <p class="blink">/// SURF THE WEB ///</p>
            <hr>
        </header>

        <main id="main-feed">
            <div class="post-card">
                <center>
                    <h2 class="blink">LOADING DATA...</h2>
                    <img src="https://web.archive.org/web/20090808061329/http://hk.geocities.com/yolanda_2222000/underconstruction.gif" alt="Under Construction">
                </center>
            </div>
        </main>

        <div class="web-buttons">
            <p><b>You are visitor number:</b></p>
            <img src="https://counter.joeyk.dev/counter.svg?name=teodev1998&theme=asoul" alt="Hit Counter"><br><br>
            
            <img src="https://web.archive.org/web/20091026210052/http://geocities.com/brian42571/ie_anim.gif" alt="Get IE">
            <img src="https://web.archive.org/web/20091027083020/http://geocities.com/SiliconValley/Way/4166/netscape.gif" alt="Netscape Now">
            <img src="https://web.archive.org/web/20090829071428/http://geocities.com/Heartland/Valley/2651/notepad.gif" alt="Made with Notepad">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0",
  measurementId: "G-JKE237HSTE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const feedContainer = document.getElementById('main-feed');

        // ==========================================
        // BLOG DATA LOGIC
        // ==========================================
        async function loadFeed() {
            try {
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    feedContainer.innerHTML = '<div class="post-card"><center><h2>NO POSTS YET!</h2><p>Check back later.</p></center></div>';
                    return;
                }

                feedContainer.innerHTML = ''; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const postDate = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : "Unknown Date";
                    
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = data.content;
                    const snippet = tempDiv.textContent.substring(0, 150) + "...";

                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <h2 class="post-title">${data.title}</h2>
                            <span class="post-date">Posted on: ${postDate}</span>
                        </div>
                        <p class="post-snippet">${snippet}</p>
                        <center><a onclick="openFullPost(this)" data-id="${doc.id}">Click here to read more...</a></center>
                    `;

                    // Sneaky way to pass data without breaking the HTML string
                    card.querySelector('a').onclick = () => openFullPost(data);
                    feedContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                feedContainer.innerHTML = '<div class="post-card"><center><h2 style="color:red;">BROKEN LINK!</h2><p>Tell the webmaster.</p></center></div>';
            }
        }

        function openFullPost(data) {
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            feedContainer.innerHTML = `
                <div class="full-post-view">
                    <a onclick="location.reload()"><< Back to Homepage</a>
                    <hr>
                    <h2 style="color: #0000FF; margin-bottom: 0;">${data.title}</h2>
                    <br>
                    <div class="full-content">${data.content}</div>
                    <hr>
                    <center>
                        <a href="mailto:fake@email.com">Email the Author</a>
                    </center>
                </div>
            `;
        }

        loadFeed();
    </script>
</body>
</html>
