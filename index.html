<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev // Night City</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-blue"></div>

    <div class="container">
        <header style="text-align: center; margin-bottom: 4rem;">
            <h1 class="neon-text">TEODEV<span class="cursor">_</span></h1>
            <p class="subtitle">// Digital Archive .01</p>
        </header>

        <main style="max-width: 800px; margin: 0 auto;">
            <div class="glass-panel">
                <article id="blog-content">
                    <p class="loading">Establishing link to database...</p>
                </article>

                <div class="interaction-zone">
                    <div class="actions">
                        <button id="like-btn" onclick="this.classList.toggle('active-like')">♥ Like</button>
                        <button onclick="document.getElementById('comment-section').classList.toggle('hidden')">💬 Comment</button>
                    </div>
                    
                    <div id="comment-section" class="hidden">
                        <textarea id="comment-input" placeholder="Initiate text sequence..."></textarea>
                        <button class="submit-btn" onclick="alert('Comment functionality pending backend link!')">Transmit</button>
                    </div>
                </div>
            </div>

            <footer style="margin-top: 4rem; text-align: center; opacity: 0.3; font-family: monospace; font-size: 0.7rem;">
                [ END OF LOG // SYSTEM ONLINE ]
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. PASTE YOUR REAL FIREBASE CONFIG HERE
        const firebaseConfig = {
 apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const contentContainer = document.getElementById('blog-content');

        // 2. Automatically load the LATEST post
        async function loadLatestPost() {
            try {
                // Fetch only the 1 most recent post
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(1));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    contentContainer.innerHTML = '<h1>System Empty</h1><p>No data found in the archive. Use the editor to transmit your first log.</p>';
                    return;
                }

                // Inject the content immediately
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // Wrap the content in a fade-in effect
                    contentContainer.style.opacity = 0;
                    contentContainer.innerHTML = `
                        <h2 style="color:var(--neon-purple); font-family:monospace; margin-bottom:1rem;">> ${data.title}</h2>
                        <div class="post-body">${data.content}</div>
                    `;
                    // Smooth transition
                    setTimeout(() => { contentContainer.style.transition = "opacity 0.5s"; contentContainer.style.opacity = 1; }, 50);
                });

            } catch (err) {
                console.error(err);
                contentContainer.innerHTML = '<p class="error">CRITICAL_ERROR: Connection to Firestore refused.</p>';
            }
        }

        // Run the function on page load
        loadLatestPost();
    </script>
</body>
</html>
