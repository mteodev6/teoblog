<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev // Night City</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="user-profile" id="auth-status" title="Click to Login/Logout">
        <span id="user-name">GUEST_USER</span>
        <div class="profile-pic">
            <img id="user-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Teo" alt="Profile">
        </div>
    </div>

    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-blue"></div>

    <div class="container">
        <header>
            <h1 class="neon-text" onclick="location.reload()" style="cursor:pointer">TEODEV<span class="cursor">_</span></h1>
            <p class="subtitle">// Digital Archive .01</p>
        </header>

        <main id="main-feed">
            <div id="loading-state" class="glass-panel">
                <p class="loading">Establishing link to database...</p>
            </div>
        </main>

        <footer>
            [ END OF LOG // SYSTEM ONLINE ]
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0",
  measurementId: "G-JKE237HSTE"
        };

        // Initialize Firebase Services
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const feedContainer = document.getElementById('main-feed');
        const userName = document.getElementById('user-name');
        const userImg = document.getElementById('user-img');
        const authArea = document.getElementById('auth-status');

        // --- AUTHENTICATION LOGIC ---
        authArea.onclick = async () => {
            if (!auth.currentUser) {
                try {
                    await signInWithPopup(auth, provider);
                } catch (err) {
                    console.error("Auth failed:", err);
                }
            } else {
                if (confirm("Disconnect from Archive?")) {
                    await signOut(auth);
                    location.reload();
                }
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userName.innerText = user.displayName.split(' ')[0].toUpperCase();
                userImg.src = user.photoURL;
            } else {
                userName.innerText = "GUEST_USER";
                userImg.src = "https://api.dicebear.com/7.x/bottts/svg?seed=Teo";
            }
        });

        // --- BLOG DATA LOGIC ---
        async function loadFeed() {
            try {
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    feedContainer.innerHTML = '<div class="glass-panel"><h2>ARCHIVE_EMPTY</h2><p>No logs detected in the cloud.</p></div>';
                    return;
                }

                feedContainer.innerHTML = ''; // Clear loading screen

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const postDate = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : "PENDING";
                    
                    // Create Snippet (strips HTML tags for the preview)
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = data.content;
                    const snippet = tempDiv.textContent.substring(0, 140) + "...";

                    const card = document.createElement('div');
                    card.className = "glass-panel post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <h2 class="post-title">> ${data.title}</h2>
                            <span class="post-date">${postDate}</span>
                        </div>
                        <p class="post-snippet">${snippet}</p>
                        <button class="read-more">DECRYPT_LOG</button>
                    `;

                    card.onclick = () => openFullPost(data);
                    feedContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                feedContainer.innerHTML = '<div class="glass-panel"><p class="error">CRITICAL_ERROR: Database signal lost.</p></div>';
            }
        }

        // --- DISPLAY LOGIC ---
        function openFullPost(data) {
            window.scrollTo({top: 0, behavior: 'smooth'});
            feedContainer.innerHTML = `
                <div class="glass-panel full-post-view">
                    <button class="back-btn" onclick="location.reload()">[ EXIT_LOG ]</button>
                    <h1 class="neon-text-small">${data.title}</h1>
                    <div class="full-content">${data.content}</div>
                    
                    <div class="interaction-zone">
                        <div class="actions">
                            <button class="btn-neon" onclick="this.classList.toggle('active-like')">
                                <span>♥</span> LIKE_POST
                            </button>
                            <button class="btn-neon" onclick="document.getElementById('comment-box').classList.toggle('hidden')">
                                <span>💬</span> ADD_COMMENT
                            </button>
                        </div>
                        <div id="comment-box" class="hidden">
                            <textarea id="comment-input" placeholder="Enter encrypted transmission..."></textarea>
                            <button class="btn-neon" style="width:100%" onclick="alert('Comment transmission protocol in development.')">SEND_DATA</button>
                        </div>
                    </div>
                </div>
            `;
        }

        loadFeed();
    </script>
</body>
</html>
