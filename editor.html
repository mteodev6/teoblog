<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev // Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        #editor-container { height: 400px; background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid var(--panel-border); border-radius: 0 0 0.5rem 0.5rem; }
        .ql-toolbar { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--panel-border) !important; border-radius: 0.5rem 0.5rem 0 0; }
        .ql-stroke { stroke: #a855f7 !important; }
        .ql-fill { fill: #a855f7 !important; }
        .ql-picker { color: #a855f7 !important; }
        .editor-input { width: 100%; padding: 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); color: white; margin-bottom: 1rem; border-radius: 0.5rem; font-family: monospace; font-size: 1.2rem; }
        .publish-btn { margin-top: 1.5rem; width: 100%; background: var(--neon-purple); color: white; border: none; padding: 1rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-blue"></div>

    <div class="container">
        <header><h1 class="neon-text">SYS_ADMIN<span class="cursor">_</span></h1></header>
        <main class="glass-panel" style="margin-top: 2rem;">
            <input type="text" id="post-title" class="editor-input" placeholder="Post Title...">
            <div id="toolbar">
                <span class="ql-formats"><select class="ql-size"></select></span>
                <span class="ql-formats"><button class="ql-bold"></button><button class="ql-italic"></button></span>
                <span class="ql-formats"><button class="ql-link"></button><button class="ql-image"></button></span>
            </div>
            <div id="editor-container"></div>
            <button id="publish-btn" class="publish-btn">Transmit to Server</button>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // GATEKEEPER
        const secret = "your_password_here"; 
        if (prompt("SYSTEM_AUTH_REQUIRED: Enter Access Key") !== secret) {
            alert("ACCESS_DENIED");
            window.location.href = "index.html";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
            authDomain: "teodevblog.firebaseapp.com",
            projectId: "teodevblog",
            storageBucket: "teodevblog.firebasestorage.app",
            messagingSenderId: "209802069985",
            appId: "1:209802069985:web:9382e0f47c210373f074a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const quill = new Quill('#editor-container', { modules: { toolbar: '#toolbar' }, theme: 'snow' });

        document.getElementById('publish-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value;
            const contentHTML = quill.root.innerHTML; 
            const btn = document.getElementById('publish-btn');
            
            if (!title || quill.getText().trim() === "") return alert("Fields required.");

            btn.innerText = "Transmitting...";
            try {
                await addDoc(collection(db, "posts"), { title, content: contentHTML, timestamp: serverTimestamp() });
                alert("Success!");
                document.getElementById('post-title').value = '';
                quill.root.innerHTML = ''; 
            } catch (e) { alert("Failed."); }
            btn.innerText = "Transmit to Server";
        });
    </script>
</body>
</html>
