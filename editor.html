<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeoDev // Editor [PRO]</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script>window.Quill = Quill; // Required for the resize module to hook in</script>
    <script src="https://unpkg.com/quill-image-resize-js@3.0.0/build/quill-image-resize.min.js"></script>

    <style>
        /* 1. Editor Size Upgrades */
        .editor-container-override {
            max-width: 1100px; /* Much wider than the standard 800px blog view */
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        #editor-container {
            height: 65vh; /* Takes up 65% of your screen height */
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--panel-border);
            border-radius: 0 0 0.5rem 0.5rem;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.1rem;
        }

        /* 2. Toolbar & Input Styling */
        .ql-toolbar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border) !important;
            border-radius: 0.5rem 0.5rem 0 0;
        }
        .ql-stroke { stroke: #a855f7 !important; }
        .ql-fill { fill: #a855f7 !important; }
        .ql-picker { color: #a855f7 !important; }
        .ql-picker-options { background-color: #020617 !important; border: 1px solid #a855f7 !important; }

        .editor-input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--panel-border);
            color: white;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.4rem;
        }
        .editor-input:focus { outline: none; border-color: var(--neon-purple); }

        /* 3. Action Buttons & Status */
        .action-row {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .publish-btn {
            flex-grow: 1;
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .publish-btn:hover { background: #9333ea; }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .draft-status {
            text-align: right;
            color: var(--neon-blue);
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-blue"></div>

    <div class="editor-container-override">
        <header style="text-align: center; margin-bottom: 2rem;">
            <h1 class="neon-text">SYS_ADMIN<span class="cursor">_</span></h1>
            <p class="subtitle">// Data Entry Terminal</p>
        </header>

        <main class="glass-panel" style="margin-top: 0;">
            <input type="text" id="post-title" class="editor-input" placeholder="Enter Post Title...">

            <div id="toolbar">
                <span class="ql-formats"><select class="ql-size"></select></span>
                <span class="ql-formats">
                    <button class="ql-bold"></button>
                    <button class="ql-italic"></button>
                    <button class="ql-underline"></button>
                </span>
                <span class="ql-formats">
                    <button class="ql-list" value="ordered"></button>
                    <button class="ql-list" value="bullet"></button>
                </span>
                <span class="ql-formats">
                    <button class="ql-link"></button>
                    <button class="ql-image"></button>
                </span>
            </div>
            <div id="editor-container"></div>
            
            <div class="draft-status" id="save-status">Draft Status: Waiting...</div>

            <div class="action-row">
                <button id="clear-btn" class="clear-btn">[ WIPE_DRAFT ]</button>
                <button id="publish-btn" class="publish-btn">Transmit to Server</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. SYSTEM GATEKEEPER
        // ==========================================
        const secret = "your_password_here"; 
        if (prompt("SYSTEM_AUTH_REQUIRED: Enter Access Key") !== secret) {
            alert("ACCESS_DENIED");
            window.location.href = "index.html";
        }

        // ==========================================
        // 2. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyB1d_gCT36RxrQcMQ2Dn7mbdszw4Z9XMQg",
  authDomain: "teodevblog.firebaseapp.com",
  projectId: "teodevblog",
  storageBucket: "teodevblog.firebasestorage.app",
  messagingSenderId: "209802069985",
  appId: "1:209802069985:web:9382e0f47c210373f074a0",
  measurementId: "G-JKE237HSTE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 3. INITIALIZE QUILL WITH IMAGE RESIZE
        // ==========================================
        const quill = new Quill('#editor-container', {
            modules: { 
                toolbar: '#toolbar',
                imageResize: {
                    displayStyles: { backgroundColor: 'black', border: 'none', color: 'white' },
                    modules: [ 'Resize', 'DisplaySize', 'Toolbar' ]
                }
            },
            theme: 'snow'
        });

        // ==========================================
        // 4. AUTO-SAVE (DRAFT) LOGIC
        // ==========================================
        const titleInput = document.getElementById('post-title');
        const statusText = document.getElementById('save-status');

        // Load draft when the page opens
        window.onload = () => {
            const savedTitle = localStorage.getItem('teodev_draft_title');
            const savedContent = localStorage.getItem('teodev_draft_content');
            
            if (savedTitle) titleInput.value = savedTitle;
            if (savedContent) quill.root.innerHTML = savedContent;
            if (savedTitle || savedContent) statusText.innerText = "Draft loaded from local memory.";
        };

        // Save title as you type
        titleInput.addEventListener('input', () => {
            localStorage.setItem('teodev_draft_title', titleInput.value);
            statusText.innerText = "Auto-saved at " + new Date().toLocaleTimeString();
        });

        // Save content as you type
        quill.on('text-change', () => {
            localStorage.setItem('teodev_draft_content', quill.root.innerHTML);
            statusText.innerText = "Auto-saved at " + new Date().toLocaleTimeString();
        });

        // Wipe Draft Button
        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("CRITICAL: Wipe current draft from local memory?")) {
                localStorage.removeItem('teodev_draft_title');
                localStorage.removeItem('teodev_draft_content');
                titleInput.value = '';
                quill.root.innerHTML = '';
                statusText.innerText = "Draft memory wiped.";
            }
        });

        // ==========================================
        // 5. TRANSMISSION LOGIC
        // ==========================================
        document.getElementById('publish-btn').addEventListener('click', async () => {
            const title = titleInput.value;
            const contentHTML = quill.root.innerHTML; 
            const btn = document.getElementById('publish-btn');
            
            if (!title || quill.getText().trim() === "") {
                alert("Error: Title and content required.");
                return;
            }

            btn.innerText = "Transmitting...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            try {
                await addDoc(collection(db, "posts"), {
                    title: title,
                    content: contentHTML,
                    timestamp: serverTimestamp() 
                });
                
                alert("Transmission successful! Data saved to Firebase.");
                
                // Clear the editor AND the local draft after successful post
                titleInput.value = '';
                quill.root.innerHTML = ''; 
                localStorage.removeItem('teodev_draft_title');
                localStorage.removeItem('teodev_draft_content');
                statusText.innerText = "Draft Status: Waiting...";
                
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Transmission failed. Check the console.");
            } finally {
                btn.innerText = "Transmit to Server";
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            }
        });
    </script>
</body>
</html>
